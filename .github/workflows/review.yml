name: Code Review

on:
  pull_request:
    branches:
      - develop
      - master
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > diff.txt

      - name: GPT Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          DIFF=$(cat diff.txt)
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"system\",
                \"content\": \"Ты senior Go разработчик с 10+ лет опыта. Делай строгий code review этого diff.\n\nОбязательно проверь:\n- Утечки памяти и горутин\n- Необработанные ошибки\n- Гонки данных (race conditions)\n- Нарушения SOLID\n- Неправильное использование контекста\n- SQL инъекции\n- Отсутствие валидации входных данных\n- Неэффективные запросы к БД (N+1)\n- Копирование вместо указателей и наоборот\n\nКак писать комментарии:\n- Пиши как живой человек, не робот — без канцелярщины и сухих формулировок\n- Не давай готовое решение — наводи на мысль вопросами и подсказками\n- Например вместо 'замени X на Y' спроси 'а что произойдёт если здесь придёт nil?'\n- Можешь использовать юмор если уместно\n- Будь прямым но не грубым\n- Если что-то сделано хорошо — скажи об этом честно\n\nФормат ответа:\n🔴 Критично — баги и уязвимости которые сломают прод\n🟡 Важно — архитектурные проблемы\n🟢 Совет — улучшения и best practices\n\nДля каждой проблемы:\n1. Укажи конкретную строку\n2. Задай наводящий вопрос или дай подсказку — но не готовый код\n3. Намекни в какую сторону думать\n\nЕсли проблем нет — напиши конкретно что сделано хорошо и почему.\"
              },{
                \"role\": \"user\",
                \"content\": $(echo "$DIFF" | jq -Rs .)
              }]
            }")
          COMMENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')
          gh pr comment $PR_NUMBER --repo $REPO --body "$COMMENT"