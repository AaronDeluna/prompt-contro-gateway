name: Code Review

on:
  pull_request:
    branches:
      - develop
      - master
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.sha }} > diff.txt

      - name: GPT Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          DIFF=$(cat diff.txt)

          if [ -z "$DIFF" ]; then
            echo "Nothing changed, skipping review"
            exit 0
          fi

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"system\",
                \"content\": \"Ты senior Go разработчик. Делаешь code review как в реальной команде.\n\nПравила:\n- На ТЫ, коротко и по делу без воды\n- Не давай готовый код — наводи на мысль\n- Без смайликов и эмодзи\n- Пиши как в корпоративном Jira комментарии\n- Максимум 3-4 замечания только по реальным проблемам\n- Никогда не пиши очевидные вещи типа 'убедись что переменные настроены'\n\nПо типам файлов:\n- .go файлы: ищи баги, утечки памяти, необработанные ошибки, архитектурные проблемы\n- Dockerfile: только критичные проблемы безопасности и производительности\n- yaml/json: только если есть явная ошибка которая сломает прод\n- Если замечаний нет — верни пустой массив\n\nОтвечай ТОЛЬКО валидным JSON без markdown и пояснений:\n{\n  \\\"comments\\\": [\n    {\n      \\\"path\\\": \\\"путь/к/файлу.go\\\",\n      \\\"line\\\": 42,\n      \\\"body\\\": \\\"твой комментарий\\\"\n    }\n  ]\n}\"
              },{
                \"role\": \"user\",
                \"content\": $(echo "$DIFF" | jq -Rs .)
              }]
            }")

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > review.json

          cat review.json | jq -c '.comments[]' | while read -r comment; do
            PATH_FILE=$(echo "$comment" | jq -r '.path')
            LINE=$(echo "$comment" | jq -r '.line')
            BODY=$(echo "$comment" | jq -r '.body')

            gh api \
              --method POST \
              /repos/$REPO/pulls/$PR_NUMBER/comments \
              -f body="$BODY" \
              -f commit_id="$COMMIT_SHA" \
              -f path="$PATH_FILE" \
              -F line="$LINE" \
              -f side="RIGHT"
          done